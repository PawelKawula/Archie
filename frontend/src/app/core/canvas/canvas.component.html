<div class="relative w-full h-full" (contextmenu)="$event.preventDefault()">
  <div #pixiContainer></div>
  <app-context-menu [menuTemplate]="stageMenuTemplate"> </app-context-menu>
  <app-simulation-popover class="bottom-4 left-1/2 -translate-x-1/2" />
</div>

<ng-template #nodeMenuTemplate let-node>
  <hlm-dropdown-menu>
    <hlm-dropdown-menu-group>
      <button
        hlmDropdownMenuItem
        (triggered)="orchestrator.removeNode(node().id)"
      >
        Remove node
      </button>
      @if (orchestrator.connectionPickState().step === "idle") {
        @if (node().type === "server" || node().type === "source") {
          <button
            hlmDropdownMenuItem
            (triggered)="orchestrator.startConnectionFromNode(node())"
          >
            Connect
          </button>
        }
        <button hlmDropdownMenuItem (triggered)="orchestrator.editNode(node())">
          Edit
        </button>
      }
    </hlm-dropdown-menu-group>
  </hlm-dropdown-menu>
</ng-template>

<ng-template #connectionMenuTemplate let-connector>
  <hlm-dropdown-menu>
    <hlm-dropdown-menu-group>
      <button
        hlmDropdownMenuItem
        (triggered)="orchestrator.editConnection(connector())"
      >
        Edit connection
      </button>
      <button
        hlmDropdownMenuItem
        (triggered)="orchestrator.removeConnection(connector().id)"
      >
        Remove connection
      </button>
    </hlm-dropdown-menu-group>
  </hlm-dropdown-menu>
</ng-template>

<ng-template #stageMenuTemplate let-pos>
  <hlm-dropdown-menu>
    <hlm-dropdown-menu-group>
      <button
        hlmDropdownMenuItem
        (triggered)="orchestrator.openAddNodeDialog(pos().x, pos().y)"
      >
        Add node
      </button>
    </hlm-dropdown-menu-group>
  </hlm-dropdown-menu>
</ng-template>
