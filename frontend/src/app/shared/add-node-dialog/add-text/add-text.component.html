<hlm-field [formGroup]="form">
  <label hlmFieldLabel for="text">text</label>
  <input
    hlmInput
    id="text"
    placeholder="..."
    autoComplete="off"
    formControlName="text"
  />
  @if (form.controls.text.touched && form.controls.text.invalid) {
    <hlm-field-error>
      @if (
        form.controls.text.errors?.["required"] ||
        form.controls.text.errors?.["minlength"]
      ) {
        Text must be at least 1 character.
      }
      @if (form.controls.text.errors?.["maxlength"]) {
        Text cannot exceed 32 characters.
      }
    </hlm-field-error>
  }
</hlm-field>
